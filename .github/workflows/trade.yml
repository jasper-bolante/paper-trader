name: trade

on:
  schedule:
    # Hourly decision runs at :35 UTC, 13-20 UTC weekdays. The script gates
    # on the real market calendar (holidays, early closes, DST), so off-hours
    # firings exit quietly. Yields decisions ~9:35am-3:35pm ET year-round.
    - cron: '35 13-20 * * 1-5'
    # End-of-day processing (snapshots, stops ratchet, report) after the close.
    - cron: '5 21 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: "auto | hourly | eod | report"
        default: "auto"

concurrency:
  group: trader
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run trader
        env:
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
        run: python main.py --mode "${{ github.event.inputs.mode || 'auto' }}"

      - name: Commit state
        run: |
          git config user.name "paper-trader-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A state REPORT.md docs
          if git diff --cached --quiet; then
            echo "no state changes"
            exit 0
          fi
          git commit -m "run: $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git push && break
            git pull --rebase
          done
